name: Awake
options:
  bundleIdPrefix: com.diabdiab
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: AR6D29J5FK
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Awake:
    type: application
    platform: macOS
    sources:
      - path: Sources/Awake
      - path: icon/AppIcon.icns
        buildPhase: resources
    info:
      path: AppStoreInfo.plist
      properties:
        CFBundleDisplayName: Awake
        CFBundleIconFile: AppIcon
        CFBundleName: Awake
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "3"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHumanReadableCopyright: Copyright 2026 Awake.
        NSAppleEventsUsageDescription: Awake uses AppleScript to ask for admin rights so it can keep your Mac awake with the lid closed.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diabdiab.awake
        PRODUCT_NAME: Awake
        ENABLE_HARDENED_RUNTIME: YES
schemes:
  Awake:
    build:
      targets:
        Awake: all
    run:
      config: Debug
    archive:
      config: Release
